version: "3.8"

services:
  apache:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: apache
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
    environment:
      - HTTP_PROXY=http://10.10.254.219:3128/
      - HTTPS_PROXY=http://10.10.254.219:3128/
      - NO_PROXY=10.,192.168.,.sfnet,wpad,127.0.0.1,localhost
      - http_proxy=http://10.10.254.219:3128/
      - https_proxy=http://10.10.254.219:3128/
      - no_proxy=10.,192.168.,.sfnet,wpad,127.0.0.1,localhost
      
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    container_name: mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    container_name: phpmyadmin

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafdrop:
    image: obsidiandynamics/kafdrop
    container_name: kafdrop
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    depends_on:
      - kafka

volumes:
  mysql_data:
