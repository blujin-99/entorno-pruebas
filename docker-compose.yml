
services:
  apache:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: apache
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./apache/api.conf:/etc/apache2/sites-available/api.conf
    command: >
      bash -c "a2ensite api.conf &&
               a2dissite 000-default.conf &&
               apachectl -D FOREGROUND"
    environment:
      - HTTP_PROXY=http://10.10.254.219:3128/
      - HTTPS_PROXY=http://10.10.254.219:3128/
      - NO_PROXY=10.,192.168.,.sfnet,wpad,127.0.0.1,localhost
      - http_proxy=http://10.10.254.219:3128/
      - https_proxy=http://10.10.254.219:3128/
      - no_proxy=10.,192.168.,.sfnet,wpad,127.0.0.1,localhost

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: api_prueba
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    container_name: mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
    container_name: phpmyadmin

volumes:
  mysql_data:
