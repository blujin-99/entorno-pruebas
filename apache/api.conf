<VirtualHost *:80>
    ServerName apache
    DocumentRoot /var/www/html/API-test/public

    <Directory /var/www/html/API-test/public>
        AllowOverride All
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/api_error.log
    CustomLog ${APACHE_LOG_DIR}/api_access.log combined
</VirtualHost>
